<div class="h-full flex flex-col">

  <!-- header -->
  <div class="w-full h-10 p-1 px-2 space-x-2 bg-cyan-500 flex flex-row">
    <div>
      <img src="icon128.png" class="h-full" />
    </div>
    <div class="justify-items-center grow">
      <div class="font-sans text-lg text-white">Settings</div>
    </div>
    <div>
      <a routerLink="/" routerLinkActive="active" ariaCurrentWhenActive="page">
        <!-- https://cdn.jsdelivr.net/npm/heroicons@2.1.3/24/outline/home.svg -->
        <!-- prettier-ignore -->
        <svg viewBox="0 0 24 24" class="h-full py-0.5 fill-none stroke-current text-white stroke-1">
          <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
        </svg>
      </a>
    </div>
  </div>

  <!-- body: left nav + right content -->
  <div class="flex flex-row grow overflow-hidden">

    <!-- left nav -->
    <div class="w-28 shrink-0 flex flex-col bg-white border-r border-slate-200">
      <button
        class="px-4 py-3 text-left text-sm font-medium transition-colors"
        [class.bg-cyan-50]="activeTab === 'general'"
        [class.text-cyan-600]="activeTab === 'general'"
        [class.border-l-2]="activeTab === 'general'"
        [class.border-cyan-500]="activeTab === 'general'"
        [class.text-slate-500]="activeTab !== 'general'"
        (click)="setTab('general')"
      >
        General
      </button>
      <button
        class="px-4 py-3 text-left text-sm font-medium transition-colors"
        [class.bg-cyan-50]="activeTab === 'search'"
        [class.text-cyan-600]="activeTab === 'search'"
        [class.border-l-2]="activeTab === 'search'"
        [class.border-cyan-500]="activeTab === 'search'"
        [class.text-slate-500]="activeTab !== 'search'"
        (click)="setTab('search')"
      >
        Search
      </button>
      <button
        class="px-4 py-3 text-left text-sm font-medium transition-colors"
        [class.bg-cyan-50]="activeTab === 'sync'"
        [class.text-cyan-600]="activeTab === 'sync'"
        [class.border-l-2]="activeTab === 'sync'"
        [class.border-cyan-500]="activeTab === 'sync'"
        [class.text-slate-500]="activeTab !== 'sync'"
        (click)="setTab('sync')"
      >
        Sync
      </button>
      <button
        class="px-4 py-3 text-left text-sm font-medium transition-colors"
        [class.bg-cyan-50]="activeTab === 'actions'"
        [class.text-cyan-600]="activeTab === 'actions'"
        [class.border-l-2]="activeTab === 'actions'"
        [class.border-cyan-500]="activeTab === 'actions'"
        [class.text-slate-500]="activeTab !== 'actions'"
        (click)="setTab('actions')"
      >
        Actions
      </button>

      <!-- <button
        class="px-4 py-3 text-left text-sm font-medium transition-colors border-l-2"
        [class.bg-cyan-50]="activeTab === 'general'"
        [class.text-cyan-600]="activeTab === 'general'"
        [class.border-cyan-500]="activeTab === 'general'"
        [class.text-slate-500]="activeTab !== 'general'"
        [class.border-transparent]="activeTab !== 'general'"
        (click)="setTab('general')"
      >
        General
      </button>
      <button
        class="px-4 py-3 text-left text-sm font-medium transition-colors border-l-2"
        [class.bg-cyan-50]="activeTab === 'sync'"
        [class.text-cyan-600]="activeTab === 'sync'"
        [class.border-cyan-500]="activeTab === 'sync'"
        [class.text-slate-500]="activeTab !== 'sync'"
        [class.border-transparent]="activeTab !== 'sync'"
        (click)="setTab('sync')"
      >
        Sync
      </button>
      <button
        class="px-4 py-3 text-left text-sm font-medium transition-colors border-l-2"
        [class.bg-cyan-50]="activeTab === 'actions'"
        [class.text-cyan-600]="activeTab === 'actions'"
        [class.border-cyan-500]="activeTab === 'actions'"
        [class.text-slate-500]="activeTab !== 'actions'"
        [class.border-transparent]="activeTab !== 'actions'"
        (click)="setTab('actions')"
      >
        Actions
      </button> -->
    </div>

    <!-- right content -->
    <div class="flex flex-col grow overflow-y-auto bg-slate-100">
      @if (activeTab === 'general') {
        <app-general-settings />
      }
      @if (activeTab === 'search') {
        <app-search-settings />
      }
      @if (activeTab === 'sync') {
        <app-sync-settings />
      }
      @if (activeTab === 'actions') {
        <app-actions />
      }
    </div>

  </div>
</div>
