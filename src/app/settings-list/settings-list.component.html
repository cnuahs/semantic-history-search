<div [formGroup]="form">
  <ul>
  @for (setting of settings; track setting.label) {
    <!-- @if (setting.category === 'general') { -->
    <li class="flex flex-col my-2">
      <span class="font-medium">{{ setting.label }}</span>
      @if (isArray(setting.value)) {
        <div class="h-5 mb-1 text-gray-500 flex flex-row">
          <span class="font-light text-sm grow">{{
            setting.description
          }}</span>
          <div class="h-full" (click)="addItem(setting.name)">
            <!-- https://cdn.jsdelivr.net/npm/heroicons@2.1.3/24/outline/plus-circle.svg -->
            <!-- prettier-ignore -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-full px-1.5 fill-none stroke-current stroke-1">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
          </div>
        </div>
        <div
          formArrayName="{{ setting.name }}"
          class="flex flex-col gap-y-1 max-h-28 overflow-y-auto"
        >
          @for (
            ctrl of getFormArray(setting.name).controls;
            track ix;
            let ix = $index
          ) {
            <div class="relative">
              <input
                id="{{ setting.name }}-{{ ix }}"
                class="w-full p-2 bg-white placeholder:text-slate-300 outline-solid outline-1 outline-slate-200 focus:outline-cyan-500 rounded-xs"
                type="text"
                autocomplete="off"
                [formControlName]="ix"
                name="{{ setting.value }}"
                ngDefaultControl
                placeholder="{{ setting.label }}"
              />
              <div
                class="absolute h-full right-0 top-0"
                (click)="delItem(setting.name, ix)"
              >
                <!-- /div>class="absolute left-0 top-0 rounded-sm bg-transparent p-1.5 text-center text-cyan-400 transition-all shadow-xs hover:shadow-sm focus:shadow-none active:shadow-none disabled:pointer-events-none disabled:opacity-50 disabled:shadow-none" -->
                <!-- https://cdn.jsdelivr.net/npm/heroicons@2.1.3/24/outline/minus-circle.svg -->
                <!-- prettier-ignore -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-full p-1.5 fill-none stroke-white stroke-1 hover:stroke-red-200">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>
              </div>
            </div>
          }
        </div>
      } @else {
        <div class="h-5 mb-1 text-gray-500">
          <span class="font-light text-sm">{{
            setting.description
          }}</span>
        </div>
        <input
          id="{{ setting.name }}"
          class="p-2 bg-white placeholder:text-slate-300 outline-solid outline-1 outline-slate-200 focus:outline-cyan-500 rounded-xs"
          [type]="isNumber(setting.value) ? 'number' : 'text'"
          autocomplete="off"
          formControlName="{{ setting.name }}"
          name="{{ setting.value }}"
          ngDefaultControl
          placeholder="{{ setting.label }}"
        />
      }
    </li>
    }
  <!-- } -->
  </ul>
</div>
